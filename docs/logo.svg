<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient: Claude orange → warm gold -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8956A"/>
      <stop offset="50%" style="stop-color:#D4845A"/>
      <stop offset="100%" style="stop-color:#C27648"/>
    </linearGradient>
    <!-- Accent gradient: electric blue → cyan -->
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Subtle grid lines (dashboard feel) -->
  <g opacity="0.06" stroke="#60A5FA" stroke-width="1">
    <line x1="100" y1="16" x2="100" y2="496"/>
    <line x1="200" y1="16" x2="200" y2="496"/>
    <line x1="300" y1="16" x2="300" y2="496"/>
    <line x1="400" y1="16" x2="400" y2="496"/>
    <line x1="16" y1="100" x2="496" y2="100"/>
    <line x1="16" y1="200" x2="496" y2="200"/>
    <line x1="16" y1="300" x2="496" y2="300"/>
    <line x1="16" y1="400" x2="496" y2="400"/>
  </g>

  <!-- Outer hexagon ring (skill tree reference) -->
  <polygon
    points="256,72 410,160 410,340 256,428 102,340 102,160"
    fill="none"
    stroke="url(#g2)"
    stroke-width="2"
    opacity="0.15"
  />

  <!-- Code brackets: < > surrounding the central icon -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- Left bracket < -->
    <path d="M108,256 L148,196 L158,206 L126,256 L158,306 L148,316 Z"
          fill="url(#g2)" opacity="0.7"/>
    <!-- Right bracket > -->
    <path d="M404,256 L364,196 L354,206 L386,256 L354,306 L364,316 Z"
          fill="url(#g2)" opacity="0.7"/>
  </g>

  <!-- Central "S" shaped path (for Super/SCC) combined with Claude spark -->
  <g transform="translate(256,248)" filter="url(#glow-strong)">
    <!-- Main Claude-inspired spark/asterisk shape -->
    <!-- Top ray -->
    <ellipse cx="0" cy="-68" rx="16" ry="40" fill="url(#g1)" transform="rotate(0)"/>
    <!-- Top-right ray -->
    <ellipse cx="0" cy="-68" rx="16" ry="40" fill="url(#g1)" transform="rotate(60)"/>
    <!-- Bottom-right ray -->
    <ellipse cx="0" cy="-68" rx="16" ry="40" fill="url(#g1)" transform="rotate(120)"/>
    <!-- Bottom ray -->
    <ellipse cx="0" cy="-68" rx="16" ry="40" fill="url(#g1)" transform="rotate(180)"/>
    <!-- Bottom-left ray -->
    <ellipse cx="0" cy="-68" rx="16" ry="40" fill="url(#g1)" transform="rotate(240)"/>
    <!-- Top-left ray -->
    <ellipse cx="0" cy="-68" rx="16" ry="40" fill="url(#g1)" transform="rotate(300)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="22" fill="url(#g1)"/>
  </g>

  <!-- Small "S" letter overlay in center -->
  <text x="256" y="262"
        font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
        font-size="36"
        font-weight="800"
        fill="#1a1a2e"
        text-anchor="middle"
        dominant-baseline="central"
        letter-spacing="-1">S</text>

  <!-- Bottom: three small connection nodes (representing agents/pipeline) -->
  <g filter="url(#glow)">
    <circle cx="196" cy="390" r="6" fill="#60A5FA" opacity="0.8"/>
    <circle cx="256" cy="390" r="6" fill="#E8956A" opacity="0.8"/>
    <circle cx="316" cy="390" r="6" fill="#4ADE80" opacity="0.8"/>
    <!-- Connection lines -->
    <line x1="202" y1="390" x2="250" y2="390" stroke="#60A5FA" stroke-width="1.5" opacity="0.4"/>
    <line x1="262" y1="390" x2="310" y2="390" stroke="#4ADE80" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Top: "SCC" tiny label -->
  <text x="256" y="135"
        font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
        font-size="22"
        font-weight="700"
        fill="#60A5FA"
        text-anchor="middle"
        opacity="0.6"
        letter-spacing="8">SCC</text>
</svg>
